<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - ممنوع الوصول</title>
    <style>
        body {
            background: #0a0e17;
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .error-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .error-code {
            font-size: 100px;
            font-weight: bold;
            color: #ff4757;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 24px;
            margin-bottom: 15px;
            color: #00e5ff;
        }
        
        .error-message {
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(90deg, #00e5ff, #006aff);
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">403</div>
        <div class="error-title">ممنوع الوصول</div>
        <div class="error-message">
            عذراً، ليس لديك صلاحية للوصول إلى هذا المورد.<br>
            يرجى التحقق من الصلاحيات أو الاتصال بالمسؤول.
        </div>
        <a href="index.html" class="btn-home">العودة للرئيسية</a>
    </div>
</body>
</html>
